# Asta Resource Repository Configuration (HOCON format)

# Allowed MIME types for documents
allowed_mime_types = [
  "application/json",
  "application/pdf",
  "text/plain",
  "text/markdown",
  "text/html"
]

# Search configuration
search {
  # Enable SQLite cache for faster search
  enable_cache = true

  # Cache file location relative to index
  cache_filename = "search.db"

  # Field weights for search ranking
  # Higher values = more important in ranking
  field_weights {
    summary = 3.0
    name = 2.0
    tags = 1.5
    extra = 1.0
  }

  # BM25 ranking parameters
  bm25 {
    # k1: Term saturation parameter (1.2-2.0)
    # Controls how quickly term frequency saturates
    # Higher = more emphasis on term frequency
    k1 = 1.2

    # b: Length normalization parameter (0.0-1.0)
    # Controls document length normalization
    # 0 = no normalization, 1 = full normalization
    b = 0.75
  }

  # Semantic search with embeddings
  embeddings {
    # Enable semantic search (requires sentence-transformers)
    enabled = true

    # Model to use for embeddings
    # Default: all-MiniLM-L6-v2 (~80MB, 384 dimensions, fast on CPU)
    model = "sentence-transformers/all-MiniLM-L6-v2"

    # Generate embeddings lazily (on first search) or eagerly (on index)
    lazy_generation = true
  }

  # Hybrid search weights (BM25 + semantic)
  hybrid {
    # Weight for BM25 keyword search (0.0-1.0)
    bm25_weight = 0.5

    # Weight for semantic similarity (0.0-1.0)
    semantic_weight = 0.5
  }
}
