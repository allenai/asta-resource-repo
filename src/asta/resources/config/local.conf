# Asta Resource Repository Configuration (HOCON format)
# Environment variables can be referenced using ${?VAR_NAME} syntax

storage {
  # Backend type (only local-index supported)
  backend = "local-index"
  backend = ${?STORAGE_BACKEND}

  local-index {
    # Namespace identifier for document URIs
    namespace = "local-index"
    namespace = ${?NAMESPACE}

    # Path to the YAML index file (relative to current working directory)
    index_path = ".asta/index.yaml"
    index_path = ${?INDEX_PATH}

    # Resource type for documents in URIs
    resource_type = "document"
    resource_type = ${?RESOURCE_TYPE}
  }
}

# Allowed MIME types for documents
allowed_mime_types = [
  "application/json",
  "application/pdf",
  "text/plain",
  "text/markdown",
  "text/html"
]
