# Asta Resource Repository Configuration (HOCON format)
# Environment variables can be referenced using ${?VAR_NAME} syntax

server {
  host = "0.0.0.0"
  port = 8000
  port = ${?SERVER_PORT}
  name = "asta-resource-repository"
  name = ${?SERVER_NAME}
}

storage {
  postgres {
    namespace = "local-postgres"
    namespace = ${?NAMESPACE}
    port = 15432
    port = ${?POSTGRES_PORT}
    host = "localhost"
    host = ${?POSTGRES_HOST}
    url = "postgresql://asta_resources:asta_resources@"${storage.postgres.host}":"${storage.postgres.port}"/asta_resources"
    url = ${?POSTGRES_URL}
  }
}

limits {
  max_file_size_mb = 100
  max_file_size_mb = ${?MAX_FILE_SIZE_MB}
  max_documents_per_user = 1000
  max_documents_per_user = ${?MAX_DOCUMENTS_PER_USER}
}
