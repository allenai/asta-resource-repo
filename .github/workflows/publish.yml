# Publish package to pypi
# See https://docs.pypi.org/trusted-publishers/ for how this is authenticated

name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  id-token: write  # Required for PyPI trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag exists
        run: |
          if ! git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Error: Tag ${{ inputs.tag }} does not exist"
            exit 1
          fi
          echo "Tag ${{ inputs.tag }} exists"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
